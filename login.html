<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вода Донбасса - Вход</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .logo-container {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 15px;
        }
        .logo-text {
            font-size: 24px;
            font-weight: bold;
            color: #0077b6;
        }
        .logo-subtext {
            font-size: 12px;
            color: #6c757d;
            margin-top: 5px;
        }
        .auth-card {
            max-width: 400px;
            margin: 0 auto;
        }
        .btn {
            text-align: center;
            display: block;
            width: 100%;
            padding: 12px;
            font-size: 16px;
        }
        .form-input {
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="card auth-card">
            <div class="logo-container">
                <svg class="logo-icon" viewBox="0 0 80 80" fill="none">
                    <circle cx="40" cy="40" r="35" fill="#0077b6"/>
                    <path d="M40 15v35M30 30c0-8 10-15 10-15s10 7 10 15M32 45c0-6 8-10 8-10s8 4 8 10" stroke="white" stroke-width="3" fill="none"/>
                    <path d="M25 55h30M25 55c0 5 5 10 10 10M45 55c0 5 5 10 10 10" stroke="#00b4d8" stroke-width="3"/>
                </svg>
                <div class="logo-text">Вода Донбасса</div>
                <div class="logo-subtext">Система тестирования персонала</div>
            </div>
            
            <div class="auth-tabs">
                <div class="auth-tab active" id="tab-login" style="cursor:pointer">Вход</div>
                <div class="auth-tab" id="tab-register" style="cursor:pointer">Регистрация</div>
            </div>
            <div id="auth-form"></div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        function showLoginForm() {
            document.getElementById('auth-form').innerHTML = '<form id="login-form">' +
                '<div class="form-group">' +
                '<input type="email" name="email" class="form-input" placeholder="Email" required>' +
                '</div>' +
                '<div class="form-group">' +
                '<input type="password" name="password" class="form-input" placeholder="Пароль" required>' +
                '</div>' +
                '<button type="submit" class="btn btn-primary">Войти в систему</button>' +
            '</form>';
            document.getElementById('login-form').addEventListener('submit', handleLogin);
        }

        function showRegisterForm() {
            document.getElementById('auth-form').innerHTML = '<form id="register-form">' +
                '<div class="form-group">' +
                '<input type="text" name="name" class="form-input" placeholder="Ваше имя" required>' +
                '</div>' +
                '<div class="form-group">' +
                '<input type="email" name="email" class="form-input" placeholder="Email" required>' +
                '</div>' +
                '<div class="form-group">' +
                '<input type="password" name="password" class="form-input" placeholder="Пароль" required minlength="6">' +
                '</div>' +
                '<div class="form-group">' +
                '<input type="text" name="position" class="form-input" placeholder="Должность">' +
                '</div>' +
                '<div class="form-group">' +
                '<input type="text" name="department" class="form-input" placeholder="Отдел">' +
                '</div>' +
                '<button type="submit" class="btn btn-primary">Зарегистрироваться</button>' +
            '</form>';
            document.getElementById('register-form').addEventListener('submit', handleRegister);
        }

        function handleLogin(e) {
            e.preventDefault();
            var form = e.target;
            var result = login(form.email.value, form.password.value);
            if (result.success) {
                saveCurrentUser(result.user);
                if (result.user.role === 'admin' || result.user.role === 'hr') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'employee.html';
                }
            } else {
                alert(result.error);
            }
        }

        function handleRegister(e) {
            e.preventDefault();
            var form = e.target;
            var result = register({
                name: form.name.value,
                email: form.email.value,
                password: form.password.value,
                position: form.position.value,
                department: form.department.value
            });
            if (result.success) {
                saveCurrentUser(result.user);
                window.location.href = 'employee.html';
            } else {
                alert(result.error);
            }
        }

        var user = getCurrentUser();
        if (user) {
            if (user.role === 'admin' || user.role === 'hr') {
                window.location.href = 'admin.html';
            } else {
                window.location.href = 'employee.html';
            }
        }

        document.getElementById('tab-login').onclick = function() {
            document.getElementById('tab-login').classList.add('active');
            document.getElementById('tab-register').classList.remove('active');
            showLoginForm();
        };

        document.getElementById('tab-register').onclick = function() {
            document.getElementById('tab-register').classList.add('active');
            document.getElementById('tab-login').classList.remove('active');
            showRegisterForm();
        };

        showLoginForm();
    </script>
</body>
</html>
