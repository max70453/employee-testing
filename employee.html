<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaterTest - Панель</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="header-logo" style="display:flex;align-items:center;gap:15px">
            <svg viewBox="0 0 80 80" fill="none" style="width:50px;height:50px">
                <circle cx="40" cy="40" r="35" fill="#0077b6"/>
                <path d="M40 15v35M30 30c0-8 10-15 10-15s10 7 10 15M32 45c0-6 8-10 8-10s8 4 8 10" stroke="white" stroke-width="3" fill="none"/>
                <path d="M25 55h30M25 55c0 5 5 10 10 10M45 55c0 5 5 10 10 10" stroke="#00b4d8" stroke-width="3"/>
            </svg>
            <div>
                <div style="font-size:18px;font-weight:bold">Водоканал Донбасса</div>
                <div style="font-size:12px;color:#90e0ef">Личный кабинет</div>
            </div>
        </div>
        <nav class="header-nav">
            <span id="user-name"></span>
            <button class="btn btn-outline btn-sm" onclick="logout()">Выход</button>
        </nav>
    </header>

    <div class="container">
        <div class="card">
            <h2 class="card-title">Мои назначенные тесты</h2>
            <div id="assignments"></div>
        </div>
        
        <div class="card mt-20">
            <h2 class="card-title">Мои результаты</h2>
            <div id="results"></div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        const user = getCurrentUser();
        if (!user || user.role === 'admin' || user.role === 'hr') {
            window.location.href = 'login.html';
        }
        document.getElementById('user-name').textContent = user.name;

        function render() {
            renderAssignments();
            renderResults();
        }

        function renderAssignments() {
            const as = getAssignments(user.id);
            const rs = getResults(user.id);
            const tests = getTests({ published: true });
            
            const pending = as.filter(a => {
                const r = rs.find(x => x.testId === a.testId);
                return !r;
            });

            if (pending.length === 0) {
                document.getElementById('assignments').innerHTML = '<div class="empty-state"><h3>Нет назначенных тестов</h3></div>';
                return;
            }

            document.getElementById('assignments').innerHTML = `
                <div class="test-grid">
                    ${pending.map(a => {
                        const t = tests.find(x => x.id === a.testId);
                        if (!t) return '';
                        const isOverdue = a.dueDate && new Date(a.dueDate) < new Date();
                        return `
                        <div class="test-card ${isOverdue ? 'test-card-overdue' : ''}">
                            <div class="test-card-header">
                                <h3>${escapeHtml(t.title)}</h3>
                                <span class="category-badge">${escapeHtml(t.category || '-')}</span>
                            </div>
                            <div class="test-card-body">
                                <p>${escapeHtml(t.description || 'Нет описания')}</p>
                                <div class="test-meta">
                                    <span>${t.timeLimit || 30} мин</span>
                                    <span>${getQuestions(t.id).length} вопросов</span>
                                    ${a.dueDate ? `<span class="${isOverdue ? 'text-danger' : ''}">Срок: ${formatDate(a.dueDate)}</span>` : ''}
                                </div>
                            </div>
                            <button class="btn btn-primary" onclick="startTest('${t.id}')">Начать тест</button>
                        </div>`;
                    }).join('')}
                </div>`;
        }

        function renderResults() {
            const rs = getResults(user.id);
            const tests = getTests();
            
            if (rs.length === 0) {
                document.getElementById('results').innerHTML = '<div class="empty-state"><h3>Нет пройденных тестов</h3></div>';
                return;
            }

            document.getElementById('results').innerHTML = `
                <div class="table-wrapper">
                    <table class="table">
                        <thead><tr><th>Тест</th><th>Балл</th><th>Оценка</th><th>Дата</th></tr></thead>
                        <tbody>${rs.map(r => {
                            const t = tests.find(x => x.id === r.testId);
                            const g = getGrade(r.percent);
                            return `<tr>
                                <td>${escapeHtml(t?.title || '-')}</td>
                                <td>${r.percent}%</td>
                                <td><span class="result-badge ${g.class}">${g.grade} (${g.label})</span></td>
                                <td>${formatDateTime(r.completedAt)}</td>
                            </tr>`;
                        }).join('')}</tbody>
                    </table>
                </div>`;
        }

        function startTest(testId) {
            sessionStorage.setItem('currentTestId', testId);
            window.location.href = 'test.html';
        }

        render();
    </script>
</body>
</html>
